name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Python deps and PyInstaller
        run: |
          python -m venv backend/.venv
          backend\.venv\Scripts\pip install -r backend/requirements.txt pyinstaller

      - name: Build exe
        run: backend\.venv\Scripts\pyinstaller --noconfirm --clean trading-ms.spec

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TradingMS.exe
          generate_release_notes: true
